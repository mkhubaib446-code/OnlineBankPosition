
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bismillah Developers - Bank Position</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#eef2f7;
color:#0f172a;
padding:20px;
}

.header{
background:linear-gradient(135deg,#0f172a,#1e293b);
color:white;
padding:25px;
border-radius:18px;
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
box-shadow:0 6px 20px rgba(0,0,0,.12);
}

.header h1{
font-size:32px;
font-weight:700;
}

.header p{
margin-top:5px;
color:#cbd5e1;
}

.container{
display:grid;
gap:20px;
}

.card{
background:white;
padding:20px;
border-radius:18px;
box-shadow:0 4px 12px rgba(0,0,0,.08);
}

.card h2{
margin-bottom:15px;
font-size:22px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:15px;
}

.summary-box{
background:linear-gradient(135deg,#ffffff,#f8fafc);
padding:20px;
border-radius:16px;
border:1px solid #e2e8f0;
}

.summary-box .title{
font-size:14px;
color:#64748b;
margin-bottom:8px;
}

.summary-box .value{
font-size:28px;
font-weight:700;
color:#0f172a;
}

input,select,button{
width:100%;
padding:12px;
border-radius:12px;
border:1px solid #cbd5e1;
font-size:14px;
}

button{
background:#0f172a;
color:white;
border:none;
cursor:pointer;
font-weight:600;
transition:.3s;
}

button:hover{
background:#1e293b;
transform:translateY(-1px);
}

.table-wrapper{
overflow:auto;
}

table{
width:100%;
border-collapse:collapse;
min-width:1200px;
}

th{
background:#0f172a;
color:white;
padding:14px;
font-size:13px;
text-align:left;
}

td{
padding:12px;
border-bottom:1px solid #e2e8f0;
font-size:13px;
}

tr:hover{
background:#f8fafc;
}

.action-btn{
padding:7px 10px;
font-size:12px;
margin-right:5px;
width:auto;
}

.edit-btn{
background:#2563eb;
}

.delete-btn{
background:#dc2626;
}

.receipt{
color:#15803d;
font-weight:600;
}

.payment{
color:#dc2626;
font-weight:600;
}

.adjustment{
color:#7c3aed;
font-weight:600;
}

@media(max-width:768px){
.header{
flex-direction:column;
align-items:flex-start;
gap:10px;
}
}
</style>
</head>
<body>

<div class="header">
<div>
<h1>Bismillah Developers</h1>
<p>Advanced Group Bank Position Dashboard</p>
</div>
<div>
<h2 id="today-date"></h2>
</div>
</div>

<div class="container">

<div class="card">
<h2>Create Project</h2>
<div class="grid">
<input type="text" id="project-name" placeholder="Project Name">
<input type="text" id="bank-name" placeholder="Bank Name">
<input type="number" id="opening-balance" placeholder="Opening Balance">
<button onclick="createProject()">Create Project</button>
</div>
</div>

<div class="card">
<h2>Dashboard Summary</h2>
<div class="grid" id="dashboard-summary"></div>
</div>

<div class="card">
<h2>Create Voucher</h2>
<div class="grid">
    <select id="voucher-project"></select>
    <select id="voucher-type" onchange="toggleReceiptStatus()">
        <option value="receipt">Receipt</option>
        <option value="payment">Payment</option>
        <option value="adjustment">Adjustment</option>
        </select>
        <select id="receipt-status">
        <option value="clear">Clear</option>
        <option value="clearing">Clearing</option>
        </select>

<input type="date" id="voucher-date">
<input type="text" id="voucher-narration" placeholder="Narration">
<input type="text" id="voucher-cheque-no" placeholder="Cheque No">
<input type="date" id="voucher-cheque-date">
<input type="number" id="voucher-amount" placeholder="Amount">

<button onclick="addVoucher()">Add Voucher</button>
</div>
</div>

<div class="card">
<h2>Group Bank Position Summary</h2>
<div class="table-wrapper">
<table id="projects-table"></table>
</div>
</div>

<div class="card">
<h2>Voucher Register</h2>
<div class="card">

    <h2>Cleared Cheques Summary</h2>
    
    <div class="table-wrapper">
    
    <table id="cleared-cheques-table"></table>
    
    </div>
    
    </div>
<div class="table-wrapper">
<table id="voucher-table"></table>
</div>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
import {
getFirestore,
collection,
addDoc,
getDocs,
doc,
updateDoc,
deleteDoc
} from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyDb4VHDQ_3mDqrX1oNIfC7hzK18O6znQLE",
authDomain: "bank-application-5c3e1.firebaseapp.com",
projectId: "bank-application-5c3e1",
storageBucket: "bank-application-5c3e1.firebasestorage.app",
messagingSenderId: "540292068600",
appId: "1:540292068600:web:8384df0a6fc4b36d12370d",
measurementId: "G-H8QJGXPWJT"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let projects = [];

window.createProject = async function(){

const projectName = document.getElementById("project-name").value;
const bankName = document.getElementById("bank-name").value;
const openingBalance = Number(document.getElementById("opening-balance").value);

if(!projectName || !bankName) return;

const project = {
projectName,
bankName,
openingBalance,
receipts:[],
payments:[],
adjustments:[]
};

await addDoc(collection(db,"projects"),project);

loadProjects();

};

window.toggleReceiptStatus = function(){

const voucherType =
document.getElementById("voucher-type").value;

const receiptStatus =
document.getElementById("receipt-status");

if(voucherType === "receipt"){

receiptStatus.style.display = "block";

}else{

receiptStatus.style.display = "none";

}

}
async function loadProjects(){

projects = [];

const querySnapshot = await getDocs(collection(db,"projects"));

querySnapshot.forEach((docSnap)=>{
projects.push({id:docSnap.id,...docSnap.data()});
});

renderAll();
}

window.toggleReceiptStatus = function(){

const voucherType =
document.getElementById("voucher-type").value;

const receiptStatus =
document.getElementById("receipt-status");

if(voucherType === "receipt"){

receiptStatus.style.display = "block";

}else{

receiptStatus.style.display = "none";

}

}
window.addVoucher = async function(){

const projectIndex =
document.getElementById("voucher-project").value;

const type =
document.getElementById("voucher-type").value;

const receiptStatus =
document.getElementById("receipt-status").value;

const date =
document.getElementById("voucher-date").value;

const narration =
document.getElementById("voucher-narration").value;

const chequeNo =
document.getElementById("voucher-cheque-no").value;

const chequeDate =
document.getElementById("voucher-cheque-date").value;

const amount =
Number(document.getElementById("voucher-amount").value);

if(projectIndex === "") return;

const project = projects[projectIndex];

const voucher = {

voucherNo:
type.toUpperCase()+"-"+Date.now(),

date,
narration,
chequeNo,
chequeDate,
amount,

status:"Approved",

clearingStatus:
type === "receipt"
? receiptStatus
: "clear",

paymentStatus:
type === "payment"
? "pending"
: ""

};

if(type === "receipt"){
project.receipts.push(voucher);
}

if(type === "payment"){
project.payments.push(voucher);
}

if(type === "adjustment"){
project.adjustments.push(voucher);
}

await updateDoc(doc(db,"projects",project.id),{

receipts:project.receipts,
payments:project.payments,
adjustments:project.adjustments

});

loadProjects();

};

function updateProjectDropdown(){

const select = document.getElementById("voucher-project");

select.innerHTML = projects.map((p,index)=>`
<option value="${index}">${p.projectName} - ${p.bankName}</option>
`).join("");

}

function renderDashboard(){

let opening = 0;
let receipts = 0;
let payments = 0;
let adjustments = 0;

projects.forEach(p=>{

opening += Number(p.openingBalance);

p.receipts.forEach(v=>{

if(v.clearingStatus !== "clearing"){

receipts += Number(v.amount);

}

});

p.payments.forEach(v=>{

if(v.paymentStatus === "cleared"){

payments += Number(v.amount);

}

});

adjustments +=
p.adjustments.reduce((a,b)=>
a + Number(b.amount),0);

});

const balance =
opening + receipts + adjustments - payments;

const items = [

["Projects",projects.length],
["Opening Balance",opening],
["Receipts",receipts],
["Payments",payments],
["Adjustments",adjustments],
["Current Balance",balance]

];

document.getElementById("dashboard-summary").innerHTML =
items.map(item=>`

<div class="summary-box">

<div class="title">${item[0]}</div>

<div class="value">
${Number(item[1]).toLocaleString()}
</div>

</div>

`).join("");

}

function renderProjects(){

const rows = projects.map((p,index)=>{

let receipts = 0;
let clearing = 0;
let clearedPayments = 0;

p.receipts.forEach(v=>{

if(v.clearingStatus === "clearing"){

clearing += Number(v.amount);

}else{

receipts += Number(v.amount);

}

});

p.payments.forEach(v=>{

if(v.paymentStatus === "cleared"){

clearedPayments += Number(v.amount);

}

});

const adjustments =
p.adjustments.reduce((a,b)=>
a + Number(b.amount),0);

const balance =
Number(p.openingBalance)
+ receipts
+ adjustments
- clearedPayments;

return `
<tr>

<td>${index+1}</td>

<td>${p.projectName}</td>

<td>${p.bankName}</td>

<td>
${Number(p.openingBalance).toLocaleString()}
</td>

<td class="receipt">
${receipts.toLocaleString()}
</td>

<td class="payment">
${clearedPayments.toLocaleString()}
</td>

<td class="adjustment">
${adjustments.toLocaleString()}
</td>

<td style="
color:#ea580c;
font-weight:700">
${clearing.toLocaleString()}
</td>

<td>
${balance.toLocaleString()}
</td>

<td>

<button
class="action-btn edit-btn"
onclick="editProject(${index})">
Edit
</button>


<button
class="action-btn delete-btn"
onclick="deleteProject('${p.id}')">
Delete
</button>

<button
style="background:#16a34a"
class="action-btn"
onclick="clearVoucher(${index})">

Clear Receipt

</button>

const project = projects[projectIndex];

if(!project || !project.payments[voucherIndex]) return;

project.payments[voucherIndex].paymentStatus = "cleared";

await updateDoc(doc(db,"projects",project.id),{
payments:project.payments
});

loadProjects();
};

</td>

</tr>
`;

}).join("");

document.getElementById("projects-table").innerHTML = `

<thead>

<tr>

<th>#</th>
<th>Project</th>
<th>Bank</th>
<th>Opening</th>
<th>Receipts</th>
<th>Payments</th>
<th>Adjustments</th>
<th>Clearing</th>
<th>Balance</th>
<th>Actions</th>

</tr>

</thead>

<tbody>

${rows}

</tbody>

`;

}
window.clearVoucher = async function(index){

const project = projects[index];

if(!project) return;

project.receipts.forEach(v=>{

if(v.clearingStatus === "clearing"){
v.clearingStatus = "clear";
}

});

await updateDoc(doc(db,"projects",project.id),{
receipts:project.receipts
});

loadProjects();
};

    

function renderAll(){
updateProjectDropdown();
renderDashboard();
renderProjects();
renderVouchers();
renderClearedCheques();
}

function renderVouchers(){

let rows = "";

projects.forEach((project,projectIndex)=>{

project.receipts.forEach(v=>{

rows += `
<tr>

<td>${project.projectName}</td>

<td>${project.bankName}</td>

<td class="receipt">Receipt</td>

<td>${v.voucherNo}</td>

<td>${v.date}</td>

<td>${v.narration}</td>

<td>${v.amount.toLocaleString()}</td>

<td>${v.clearingStatus}</td>

<td>-</td>

</tr>
`;

});

let rows = "";

projects.forEach(project=>{

project.payments.forEach(v=>{

if(v.paymentStatus === "cleared"){

rows += `
<tr>

<td>${project.projectName}</td>

<td>${project.bankName}</td>

<td>${v.voucherNo}</td>

<td>${v.date}</td>

<td>${v.chequeNo}</td>

<td>${v.amount.toLocaleString()}</td>

</tr>
`;

}

});

});

document.getElementById("cleared-cheques-table").innerHTML = `

<thead>

<tr>

<th>Project</th>
<th>Bank</th>
<th>Voucher No</th>
<th>Date</th>
<th>Cheque No</th>
<th>Amount</th>

</tr>

</thead>

<tbody>

${rows}

</tbody>

`;

}
project.payments.forEach((v,vIndex)=>{

rows += `
<tr>

<td>${project.projectName}</td>

<td>${project.bankName}</td>

<td class="payment">Payment</td>

<td>${v.voucherNo}</td>

<td>${v.date}</td>

<td>${v.narration}</td>

<td>${v.amount.toLocaleString()}</td>

<td>${v.paymentStatus || "pending"}</td>

<td>

${
(v.paymentStatus !== "cleared")

?

`<button
style="background:#16a34a"
onclick="clearPayment(${projectIndex},${vIndex})">

Clear

</button>`

:

"Cleared"

}

</td>

</tr>
`;

});

project.adjustments.forEach(v=>{

rows += `
<tr>

<td>${project.projectName}</td>

<td>${project.bankName}</td>

<td class="adjustment">Adjustment</td>

<td>${v.voucherNo}</td>

<td>${v.date}</td>

<td>${v.narration}</td>

<td>${v.amount.toLocaleString()}</td>

<td>-</td>

<td>-</td>

</tr>
`;

});

});

document.getElementById("voucher-table").innerHTML = `

<thead>

<tr>

<th>Project</th>
<th>Bank</th>
<th>Type</th>
<th>Voucher No</th>
<th>Date</th>
<th>Narration</th>
<th>Amount</th>
<th>Status</th>
<th>Action</th>

</tr>

</thead>

<tbody>

${rows}

</tbody>

`;

}

const today = new Date();
document.getElementById("today-date").innerText = today.toLocaleDateString();

loadProjects();

</script>

</body>
</html>
