
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Banking System - Bank Position</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#eef2f7;
color:#0f172a;
padding:20px;
}

.header{
background:linear-gradient(135deg,#0f172a,#1e293b);
color:white;
padding:25px;
border-radius:18px;
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
box-shadow:0 6px 20px rgba(0,0,0,.12);
}

.header h1{
font-size:32px;
font-weight:700;
}

.header p{
margin-top:5px;
color:#cbd5e1;
}

.container{
display:grid;
gap:20px;
}

.card{
background:white;
padding:20px;
border-radius:18px;
box-shadow:0 4px 12px rgba(0,0,0,.08);
}

.card h2{
margin-bottom:15px;
font-size:22px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:15px;
}

.summary-box{
background:linear-gradient(135deg,#ffffff,#f8fafc);
padding:20px;
border-radius:16px;
border:1px solid #e2e8f0;
}

.summary-box .title{
font-size:14px;
color:#64748b;
margin-bottom:8px;
}

.summary-box .value{
font-size:28px;
font-weight:700;
color:#0f172a;
}

input,select,button{
width:100%;
padding:12px;
border-radius:12px;
border:1px solid #cbd5e1;
font-size:14px;
}

button{
background:#0f172a;
color:white;
border:none;
cursor:pointer;
font-weight:600;
transition:.3s;
}

button:hover{
background:#1e293b;
transform:translateY(-1px);
}

.table-wrapper{
overflow:auto;
}

table{
width:100%;
border-collapse:collapse;
min-width:1200px;
}

th{
background:#0f172a;
color:white;
padding:14px;
font-size:13px;
text-align:left;
}

td{
padding:12px;
border-bottom:1px solid #e2e8f0;
font-size:13px;
}

tr:hover{
background:#f8fafc;
}

.action-btn{
padding:7px 10px;
font-size:12px;
margin-right:5px;
width:auto;
}

.edit-btn{
background:#2563eb;
}

.delete-btn{
background:#dc2626;
}

.receipt{
color:#15803d;
font-weight:600;
}

.payment{
color:#dc2626;
font-weight:600;
}

.adjustment{
color:#7c3aed;
font-weight:600;
}

@media(max-width:768px){
.header{
flex-direction:column;
align-items:flex-start;
gap:10px;
}
}
</style>
</head>
<body>

<div class="header">
<div>
<h1>Banking System</h1>
<p>Advanced Group Bank Position Dashboard</p>
</div>
<div>
<h2 id="today-date"></h2>
</div>
</div>

<div class="container">

<div class="card">
<h2>Create Project</h2>
<div class="grid">
<input type="text" id="project-name" placeholder="Project Name">
<input type="text" id="bank-name" placeholder="Bank Name">
<input type="number" id="opening-balance" placeholder="Opening Balance">
<button onclick="createProject()">Create Project</button>
</div>
</div>

<div class="card">
<h2>Dashboard Summary</h2>
<div class="grid" id="dashboard-summary"></div>
</div>

<div class="card">
    <h2>Create Voucher</h2>
    
    <div class="grid">
    
    <!-- PROJECT -->
    <select id="voucher-project"></select>
    
    <!-- VOUCHER TYPE -->
    <select id="voucher-type">
    <option value="receipt">Receipt</option>
    <option value="payment">Payment</option>
    <option value="adjustment">Adjustment</option>
    </select>
    
    <!-- RECEIPT MODE -->
    <select id="receipt-mode">
    <option value="online">Online</option>
    <option value="cash">Cash</option>
    <option value="clearing">Clearing</option>
    </select>
    
    <!-- PAYMENT MODE -->
    <select id="payment-mode">
    <option value="instant">Instant Payment</option>
    <option value="pdc">Post Dated Cheque</option>
    </select>
    
    <input type="date" id="voucher-date">
    <input type="text" id="voucher-narration" placeholder="Narration">
    <input type="text" id="voucher-cheque-no" placeholder="Cheque No">
    <input type="date" id="voucher-cheque-date">
    <input type="number" id="voucher-amount" placeholder="Amount">
    
    <button onclick="addVoucher()">Add Voucher</button>
    
    </div>
    </div>

<div class="card">
<h2>Group Bank Position Summary</h2>
<div class="table-wrapper">
<table id="projects-table"></table>
</div>
</div>

<div class="card">
    <h2>Bank Receipt Voucher Register</h2>
    <div class="table-wrapper">
    <table id="receipt-table"></table>
    </div>
    </div>
    
    <div class="card">
    <h2>Bank Payment Voucher Register</h2>
    
    <div class="table-wrapper">
    <table id="payment-table"></table>
    </div>
    </div>
    
    <div class="card">
        <h2>Payments Clear Today</h2>
        
        <div class="table-wrapper">
        <table id="cleared-payment-table"></table>
        </div>
        
        </div>

    <div class="card">
    <h2>Adjustment Voucher Register</h2>
    <div class="table-wrapper">
    <table id="adjustment-table"></table>
    </div>
    </div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
import {
getFirestore,
collection,
addDoc,
getDocs,
doc,
updateDoc,
deleteDoc
} from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyDb4VHDQ_3mDqrX1oNIfC7hzK18O6znQLE",
authDomain: "bank-application-5c3e1.firebaseapp.com",
projectId: "bank-application-5c3e1",
storageBucket: "bank-application-5c3e1.firebasestorage.app",
messagingSenderId: "540292068600",
appId: "1:540292068600:web:8384df0a6fc4b36d12370d",
measurementId: "G-H8QJGXPWJT"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let projects = [];

window.createProject = async function(){

const projectName = document.getElementById("project-name").value;
const bankName = document.getElementById("bank-name").value;
const openingBalance = Number(document.getElementById("opening-balance").value);

if(!projectName || !bankName) return;

const project = {
projectName,
bankName,
openingBalance,
receipts:[],
payments:[],
adjustments:[],
clearedPayments:[]

};

await addDoc(collection(db,"projects"),project);

loadProjects();

};

async function loadProjects(){

projects = [];

const querySnapshot = await getDocs(collection(db,"projects"));

querySnapshot.forEach((docSnap)=>{
projects.push({id:docSnap.id,...docSnap.data()});
});

renderAll();
}

let editingVoucher = null;

window.addVoucher = async function(){

const projectIndex = document.getElementById("voucher-project").value;
const type = document.getElementById("voucher-type").value;
const date = document.getElementById("voucher-date").value;
const narration = document.getElementById("voucher-narration").value;
const chequeNo = document.getElementById("voucher-cheque-no").value;
const chequeDate = document.getElementById("voucher-cheque-date").value;
const amount = Number(document.getElementById("voucher-amount").value);
const receiptMode = document.getElementById("receipt-mode").value;
const paymentMode = document.getElementById("payment-mode").value;
if(projectIndex === "") return;

const project = projects[projectIndex];


// EDIT EXISTING VOUCHER
if(editingVoucher){

const oldProject = projects[editingVoucher.projectIndex];

const updatedVoucher = {
...editingVoucher.oldVoucher,
date,
narration,
chequeNo,
chequeDate,
amount
};

if(editingVoucher.type === "receipt"){
oldProject.receipts[editingVoucher.voucherIndex] = updatedVoucher;
}

if(editingVoucher.type === "payment"){
oldProject.payments[editingVoucher.voucherIndex] = updatedVoucher;
}

if(editingVoucher.type === "adjustment"){
oldProject.adjustments[editingVoucher.voucherIndex] = updatedVoucher;
}

await updateDoc(doc(db,"projects",oldProject.id),{
receipts:oldProject.receipts,
payments:oldProject.payments,
adjustments:oldProject.adjustments
});

editingVoucher = null;

}else{

// NEW VOUCHER
const voucher = {
voucherNo:type.toUpperCase()+"-"+Date.now(),
date,
narration,
chequeNo,
chequeDate,
amount,
receiptMode,
cleared: receiptMode !== "clearing",
paymentMode,
clearedPayment: paymentMode !== "pdc",
status:"Approved"
};

if(type === "receipt"){
project.receipts.push(voucher);
}

if(type === "payment"){
project.payments.push(voucher);
}

if(type === "adjustment"){
project.adjustments.push(voucher);
}

await updateDoc(doc(db,"projects",project.id),{
receipts:project.receipts,
payments:project.payments,
adjustments:project.adjustments
});

}


// CLEAR FORM
document.getElementById("voucher-date").value = "";
document.getElementById("voucher-narration").value = "";
document.getElementById("voucher-cheque-no").value = "";
document.getElementById("voucher-cheque-date").value = "";
document.getElementById("voucher-amount").value = "";

loadProjects();

};

window.editVoucher = function(projectIndex,type,voucherIndex){

const project = projects[projectIndex];

let voucher;

if(type === "receipt"){
voucher = project.receipts[voucherIndex];
}

if(type === "payment"){
voucher = project.payments[voucherIndex];
}

if(type === "adjustment"){
voucher = project.adjustments[voucherIndex];
}

document.getElementById("voucher-project").value = projectIndex;
document.getElementById("voucher-type").value = type;
document.getElementById("voucher-date").value = voucher.date;
document.getElementById("voucher-narration").value = voucher.narration;
document.getElementById("voucher-cheque-no").value = voucher.chequeNo || "";
document.getElementById("voucher-cheque-date").value = voucher.chequeDate || "";
document.getElementById("voucher-amount").value = voucher.amount;

editingVoucher = {
projectIndex,
type,
voucherIndex,
oldVoucher:voucher
};

window.scrollTo({
top:0,
behavior:"smooth"
});

};


window.deleteVoucher = async function(projectIndex,type,voucherIndex){

const confirmDelete = confirm("Delete this voucher?");

if(!confirmDelete) return;

const project = projects[projectIndex];

if(type === "receipt"){
project.receipts = project.receipts.filter((_,i)=>i !== voucherIndex);
}

if(type === "payment"){
project.payments = project.payments.filter((_,i)=>i !== voucherIndex);
}

if(type === "adjustment"){
project.adjustments = project.adjustments.filter((_,i)=>i !== voucherIndex);
}

await updateDoc(doc(db,"projects",project.id),{
receipts:project.receipts,
payments:project.payments,
adjustments:project.adjustments
});

loadProjects();

};

// CLEAR RECEIPT
window.clearVoucher = async function(projectIndex,voucherIndex){

const project = projects[projectIndex];

// MARK RECEIPT AS CLEARED
project.receipts[voucherIndex].cleared = true;

await updateDoc(doc(db,"projects",project.id),{
receipts:project.receipts
});

loadProjects();

};


// CLEAR PAYMENT
window.clearPayment = async function(projectIndex,voucherIndex){

const project = projects[projectIndex];

const payment = project.payments[voucherIndex];

// CREATE ARRAY IF NOT EXISTS
if(!project.clearedPayments){
project.clearedPayments = [];
}

// ADD INTO CLEARED PAYMENTS REGISTER
project.clearedPayments.push({
...payment,
clearedDate:new Date().toLocaleDateString()
});

// REMOVE FROM PAYMENT REGISTER
project.payments = project.payments.filter((_,i)=>i !== voucherIndex);

// UPDATE FIREBASE
await updateDoc(doc(db,"projects",project.id),{
payments:project.payments,
clearedPayments:project.clearedPayments
});

loadProjects();

};




window.deleteProject = async function(id){

if(confirm("Delete this project?")){
await deleteDoc(doc(db,"projects",id));
loadProjects();
}

};

window.editProject = async function(index){

const project = projects[index];

const newName = prompt("Project Name",project.projectName);
const newBank = prompt("Bank Name",project.bankName);
const newOpening = prompt("Opening Balance",project.openingBalance);

await updateDoc(doc(db,"projects",project.id),{
projectName:newName,
bankName:newBank,
openingBalance:Number(newOpening)
});

loadProjects();

};

function updateProjectDropdown(){

const select = document.getElementById("voucher-project");

select.innerHTML = projects.map((p,index)=>`
<option value="${index}">${p.projectName} - ${p.bankName}</option>
`).join("");

}

function renderDashboard(){

let opening = 0;
let receipts = 0;
let payments = 0;
let adjustments = 0;

projects.forEach(p=>{

opening += Number(p.openingBalance);

receipts += p.receipts
.filter(v => v.cleared !== false)
.reduce((a,b)=>a + Number(b.amount),0);

payments += p.payments
.filter(v => v.clearedPayment !== false)
.reduce((a,b)=>a + Number(b.amount),0);

payments += (p.clearedPayments || [])
.reduce((a,b)=>a + Number(b.amount),0);

adjustments += p.adjustments.reduce((a,b)=>a + Number(b.amount),0);

});

const balance = opening + receipts + adjustments - payments;

const items = [
["Projects",projects.length],
["Opening Balance",opening],
["Receipts",receipts],
["Payments",payments],
["Adjustments",adjustments],
["Current Balance",balance]
];


document.getElementById("dashboard-summary").innerHTML = items.map(item=>`
<div class="summary-box">
<div class="title">${item[0]}</div>
<div class="value">${Number(item[1]).toLocaleString()}</div>
</div>
`).join("");

}

function renderProjects(){

const rows = projects.map((p,index)=>{

    const receipts = p.receipts
.filter(v => v.cleared !== false)
.reduce((a,b)=>a + Number(b.amount),0);
const payments =
p.payments
.filter(v => v.clearedPayment !== false)
.reduce((a,b)=>a + Number(b.amount),0)

+

(p.clearedPayments || [])
.reduce((a,b)=>a + Number(b.amount),0);
const adjustments = p.adjustments.reduce((a,b)=>a + Number(b.amount),0);

const balance = Number(p.openingBalance) + receipts + adjustments - payments;

return `
<tr>
<td>${index+1}</td>
<td>${p.projectName}</td>
<td>${p.bankName}</td>
<td>${Number(p.openingBalance).toLocaleString()}</td>
<td class="receipt">${receipts.toLocaleString()}</td>
<td class="payment">${payments.toLocaleString()}</td>
<td class="adjustment">${adjustments.toLocaleString()}</td>
<td>${balance.toLocaleString()}</td>
<td>
    <button class="action-btn edit-btn"
onclick="window.editProject(${index})">
Edit
</button>

<button class="action-btn delete-btn"
onclick="window.deleteProject('${p.id}')">
Delete
</button>
</td>
</tr>
`;

}).join("");


document.getElementById("projects-table").innerHTML = `
<thead>
<tr>
<th>#</th>
<th>Project</th>
<th>Bank</th>
<th>Opening</th>
<th>Receipts</th>
<th>Payments</th>
<th>Adjustments</th>
<th>Balance</th>
<th>Actions</th>
</tr>
</thead>
<tbody>${rows}</tbody>
`;

}

function renderVouchers(){

let receiptRows = "";
let paymentRows = "";
let adjustmentRows = "";

projects.forEach((project,projectIndex)=>{

project.receipts = (project.receipts || []).filter(v=>v);
project.payments = (project.payments || []).filter(v=>v);
project.adjustments = (project.adjustments || []).filter(v=>v);


// RECEIPTS
project.receipts.forEach((v,voucherIndex)=>{

receiptRows += `
<tr>
<td>${project.projectName}</td>
<td>${project.bankName}</td>
<td>${v.voucherNo}</td>
<td>${v.date}</td>
<td>${v.narration}</td>
<td>${v.chequeNo || ""}</td>
<td>${v.chequeDate || ""}</td>
<td class="receipt">${Number(v.amount).toLocaleString()}</td>

<td>
${v.cleared === false ? `
<button class="action-btn"
style="background:#15803d"
onclick="window.clearVoucher(${projectIndex},${voucherIndex})">
Clear
</button>
` : "Cleared"}
</td>

<td>
<button class="action-btn edit-btn"
onclick="window.editVoucher(${projectIndex},'receipt',${voucherIndex})">
Edit
</button>

<button class="action-btn delete-btn"
onclick="window.deleteVoucher(${projectIndex},'receipt',${voucherIndex})">
Delete
</button>
</td>
</tr>

`;
let clearedRows = "";

projects.forEach(project=>{

(project.clearedPayments || []).forEach(v=>{

clearedRows += `
<tr>
<td>${project.projectName}</td>
<td>${project.bankName}</td>
<td>${v.voucherNo}</td>
<td>${v.date}</td>
<td>${v.narration}</td>
<td>${v.chequeNo || ""}</td>
<td>${v.chequeDate || ""}</td>
<td>${v.clearedDate || ""}</td>
<td class="payment">${Number(v.amount).toLocaleString()}</td>
</tr>
`;

});

});


document.getElementById("cleared-payment-table").innerHTML = `
<thead>
<tr>
<th>Project</th>
<th>Bank</th>
<th>Voucher No</th>
<th>Voucher Date</th>
<th>Narration</th>
<th>Cheque No</th>
<th>Cheque Date</th>
<th>Cleared Date</th>
<th>Amount</th>
</tr>
</thead>

<tbody>
${clearedRows}
</tbody>
`;
});


// PAYMENTS
project.payments.forEach((v,voucherIndex)=>{

paymentRows += `
<tr>
<td>${project.projectName}</td>
<td>${project.bankName}</td>
<td>${v.voucherNo}</td>
<td>${v.date}</td>
<td>${v.narration}</td>
<td>${v.chequeNo || ""}</td>
<td>${v.chequeDate || ""}</td>
<td class="payment">${Number(v.amount).toLocaleString()}</td>

<td>
${v.clearedPayment === false ? `
<button class="action-btn"
style="background:#15803d"
onclick="window.clearPayment(${projectIndex},${voucherIndex})">
Clear
</button>
` : "Instant"}
</td>

<td>
<button class="action-btn edit-btn"
onclick="window.editVoucher(${projectIndex},'payment',${voucherIndex})">
Edit
</button>

<button class="action-btn delete-btn"
onclick="window.deleteVoucher(${projectIndex},'payment',${voucherIndex})">
Delete
</button>
</td>
</tr>
`;

});


// ADJUSTMENTS
project.adjustments.forEach((v,voucherIndex)=>{

adjustmentRows += `
<tr>
<td>${project.projectName}</td>
<td>${project.bankName}</td>
<td>${v.voucherNo}</td>
<td>${v.date}</td>
<td>${v.narration}</td>
<td>${v.chequeNo || ""}</td>
<td>${v.chequeDate || ""}</td>
<td class="adjustment">${Number(v.amount).toLocaleString()}</td>

<td>
<button class="action-btn edit-btn"
onclick="window.editVoucher(${projectIndex},'adjustment',${voucherIndex})">
Edit
</button>

<button class="action-btn delete-btn"
onclick="window.deleteVoucher(${projectIndex},'adjustment',${voucherIndex})">
Delete
</button>
</td>
</tr>
`;

});

});


// RECEIPT TABLE
document.getElementById("receipt-table").innerHTML = `
<thead>
<tr>
<th>Project</th>
<th>Bank</th>
<th>Voucher No</th>
<th>Date</th>
<th>Narration</th>
<th>Cheque No</th>
<th>Cheque Date</th>
<th>Amount</th>
<th>Clear Status</th>
<th>Actions</th>
</tr>
</thead>
<tbody>${receiptRows}</tbody>
`;


// PAYMENT TABLE
document.getElementById("payment-table").innerHTML = `
<thead>
<tr>
<th>Project</th>
<th>Bank</th>
<th>Voucher No</th>
<th>Date</th>
<th>Narration</th>
<th>Cheque No</th>
<th>Cheque Date</th>
<th>Amount</th>
<th>Clear Status</th>
<th>Actions</th>
</tr>
</thead>
<tbody>${paymentRows}</tbody>
`;


// ADJUSTMENT TABLE
document.getElementById("adjustment-table").innerHTML = `
<thead>
<tr>
<th>Project</th>
<th>Bank</th>
<th>Voucher No</th>
<th>Date</th>
<th>Narration</th>
<th>Cheque No</th>
<th>Cheque Date</th>
<th>Amount</th>
<th>Clear Status</th>
<th>Actions</th>
</tr>
</thead>
<tbody>${adjustmentRows}</tbody>
`;

}

function renderAll(){
updateProjectDropdown();
renderDashboard();
renderProjects();
renderVouchers();
}

const today = new Date();
document.getElementById("today-date").innerText = today.toLocaleDateString();

loadProjects();

</script>

</body>
</html>
