<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bank Management</title>
<style>
*{box-sizing:border-box}
body{margin:0;font-family:Arial,sans-serif;background:#f8fafc;color:#0f172a}
.container{max-width:1200px;margin:0 auto;padding:24px;display:grid;gap:20px}
.card{background:#fff;border-radius:16px;padding:20px;box-shadow:0 4px 14px rgba(0,0,0,.06)}
h1{margin:0 0 8px;font-size:30px}
h2{margin:0 0 16px;font-size:20px}
p{margin:0;color:#64748b}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:14px}
input,select,button{width:100%;padding:11px;border:1px solid #cbd5e1;border-radius:10px;font-size:14px}
button{background:#0f172a;color:white;border:none;cursor:pointer}
table{width:100%;border-collapse:collapse;font-size:14px}
th,td{padding:12px;text-align:left;border-bottom:1px solid #e2e8f0}
th{background:#f1f5f9}
.metric{font-size:26px;font-weight:700}
.label{font-size:13px;color:#64748b}
</style>
</head>
<body>
<div class="container">
  <div>
    <h1>Bank Summary & Vouchers</h1>
    <p>Functional bank position with live summary updates</p>
  </div>

  <div class="card">
    <h2>Summary</h2>
    <div class="grid" id="summary-cards"></div>
    <div style="margin-top:20px">
      <h2>Bank Wise Position</h2>
      <table id="bank-summary-table"></table>
    </div>
  </div>

  <div class="card">
    <h2>Create Voucher</h2>
    <div class="grid">
      <select id="voucher-type">
        <option value="receipt">Bank Receipt Voucher</option>
        <option value="payment">Bank Payment Voucher</option>
        <option value="adjustment">Bank Adjustment Voucher</option>
      </select>
      <input id="voucher-date" type="date">
      <input id="voucher-bank" placeholder="Bank name">
      <input id="voucher-narration" placeholder="Narration">
      <input id="voucher-cheque-no" placeholder="Cheque No">
      <input id="voucher-cheque-date" type="date">
      <input id="voucher-amount" type="number" placeholder="Amount">
      <button onclick="addVoucher()">Add Voucher</button>
      <button onclick="clearAllData()">Clear All Data</button>
    </div>
  </div>

  <div class="card"><h2>Bank Receipt Voucher</h2><div id="receipt-summary" style="margin-bottom:12px;color:#475569;font-size:14px"></div><table id="receipt-table"></table></div>
  <div class="card"><h2>Bank Payment Voucher</h2><div id="payment-summary" style="margin-bottom:12px;color:#475569;font-size:14px"></div><table id="payment-table"></table></div>
  <div class="card"><h2>Bank Adjustment Voucher</h2><div id="adjustment-summary" style="margin-bottom:12px;color:#475569;font-size:14px"></div><table id="adjustment-table"></table></div>
</div>

<script>
const openingBalance = 0;

function saveData(){
  localStorage.setItem("bankAppData", JSON.stringify({
    receiptVoucher: receiptVoucher.rows,
    paymentVoucher: paymentVoucher.rows,
    adjustmentVoucher: adjustmentVoucher.rows
  }));
}

function loadData(){
  const saved = localStorage.getItem("bankAppData");
  if(!saved) return;
  const data = JSON.parse(saved);
  receiptVoucher.rows = data.receiptVoucher || [];
  paymentVoucher.rows = data.paymentVoucher || [];
  adjustmentVoucher.rows = data.adjustmentVoucher || [];
}

function clearAllData(){
  if(confirm("Remove all saved data?")){
    localStorage.removeItem("bankAppData");
    receiptVoucher.rows = [];
    paymentVoucher.rows = [];
    adjustmentVoucher.rows = [];
    loadData();
renderAll();
  }
}

const receiptVoucher = {
  headers:["Voucher No","Date","Narration","Bank","Amount"],
  rows:[]
};
const paymentVoucher = {
  headers:["Voucher No","Date","Narration","Bank","Cheque No","Cheque Presenting Date","Amount","Status","Cleared Date"],
  rows:[]
};
const adjustmentVoucher = {
  headers:["Voucher No","Date","Narration","Bank","Amount"],
  rows:[]
};

function amountOf(rows, index){
  return rows.reduce((a,r)=>a + Number(r[index]), 0);
}

function getBankSummary(){
  const banks = {};

  function ensureBank(name){
    if(!banks[name]){
      banks[name] = {
        opening: openingBalance,
        receipt: 0,
        adjustment: 0,
        payment: 0
      };
    }
  }

  receiptVoucher.rows.forEach(r=>{
    ensureBank(r[3]);
    banks[r[3]].receipt += Number(r[4]);
  });

  paymentVoucher.rows.forEach(r=>{
    ensureBank(r[3]);
    if(r[7] === "Cleared") {
      banks[r[3]].payment += Number(r[6]);
    }
  });

  adjustmentVoucher.rows.forEach(r=>{
    ensureBank(r[3]);
    banks[r[3]].adjustment += Number(r[4]);
  });

  return banks;
}

function renderSummary(){
  const debit = amountOf(receiptVoucher.rows,4);
  const bankPayments = paymentVoucher.rows.reduce((a,r)=> a + (r[7] === "Cleared" ? Number(r[6]) : 0), 0);
  const credit = amountOf(adjustmentVoucher.rows,4);
  const balance = openingBalance + debit - bankPayments + credit;

  const items = [
    ["Opening Balance", openingBalance],
    ["Debit", debit],
    ["Credit", credit],
    ["Bank Payments", bankPayments],
    ["Current Balance", balance]
  ];

  document.getElementById("summary-cards").innerHTML = items.map(i =>
    `<div class="card"><div class="label">${i[0]}</div><div class="metric">${Number(i[1]).toLocaleString()}</div></div>`
  ).join("");

  const banks = getBankSummary();
  const rows = Object.entries(banks).map(([name,data])=>{
    const closing = data.opening + data.receipt + data.adjustment - data.payment;
    return `<tr>
      <td>${name}</td>
      <td>${data.opening.toLocaleString()}</td>
      <td>${data.receipt.toLocaleString()}</td>
      <td>${data.adjustment.toLocaleString()}</td>
      <td>${data.payment.toLocaleString()}</td>
      <td>${closing.toLocaleString()}</td>
      <td>${data.payment.toLocaleString()}</td>
    </tr>`;
  }).join("");

  document.getElementById("bank-summary-table").innerHTML = `
    <thead>
      <tr>
        <th>Bank</th>
        <th>Opening Balance</th>
        <th>Receipts</th>
        <th>Adjustments</th>
        <th>Payments</th>
        <th>Closing Balance</th>
        <th>Payments Cleared Today</th>
      </tr>
    </thead>
    <tbody>${rows}</tbody>`;
}

function renderTable(id, data){
  const table = document.getElementById(id);
  table.innerHTML = `
    <thead><tr>${data.headers.map(h=>`<th>${h}</th>`).join("")}${id === "payment-table" ? "<th>Action</th>" : ""}</tr></thead>
    <tbody>
      ${data.rows.map((r,index)=>`<tr>${r.map(c=>`<td>${typeof c === 'number' ? c.toLocaleString() : c}</td>`).join("")}${id === "payment-table" ? `<td>${r[7] === "Pending" ? `<button onclick="clearCheque(${index})">Clear</button>` : ""}</td>` : ""}</tr>`).join("")}
    </tbody>`;
}

function clearCheque(index){
  if(paymentVoucher.rows[index] && paymentVoucher.rows[index][7] === "Pending"){
    paymentVoucher.rows[index][7] = "Cleared";
    paymentVoucher.rows[index][8] = new Date().toISOString().split('T')[0];
    renderAll();
  }
}

function addVoucher(){
  const type = document.getElementById("voucher-type").value;
  const date = document.getElementById("voucher-date").value;
  const bank = document.getElementById("voucher-bank").value;
  const narration = document.getElementById("voucher-narration").value || "Entry";
  const chequeNo = document.getElementById("voucher-cheque-no").value;
  const chequeDate = document.getElementById("voucher-cheque-date").value;
  const amount = Number(document.getElementById("voucher-amount").value);

  if(!date || !bank || !amount) return;

  let target;
  let prefix;

  if(type === "receipt") { target = receiptVoucher; prefix = "BRV"; }
  if(type === "payment") { target = paymentVoucher; prefix = "BPV"; }
  if(type === "adjustment") { target = adjustmentVoucher; prefix = "BAV"; }

  const voucherNo = `${prefix}-${String(target.rows.length + 1).padStart(3,"0")}`;
  target.rows.push(type === "payment" ? [voucherNo, date, narration, bank, chequeNo, chequeDate, amount, "Pending", ""] : [voucherNo, date, narration, bank, amount]);

  document.getElementById("voucher-date").value = "";
  document.getElementById("voucher-bank").value = "";
  document.getElementById("voucher-narration").value = "";
  document.getElementById("voucher-cheque-no").value = "";
  document.getElementById("voucher-cheque-date").value = "";
  document.getElementById("voucher-amount").value = "";

  renderAll();
}

function renderAll(){
  saveData();
  renderSummary();
  renderTable("receipt-table", receiptVoucher);
  renderTable("payment-table", paymentVoucher);
  renderTable("adjustment-table", adjustmentVoucher);
}

renderAll();
</script>
</body>
</html>
