
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bismillah Group Bank Position</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial,sans-serif;
background:#f8fafc;
color:#0f172a;
}

.container{
max-width:1400px;
margin:auto;
padding:20px;
display:grid;
gap:20px;
}

.card{
background:white;
padding:20px;
border-radius:16px;
box-shadow:0 4px 12px rgba(0,0,0,.08);
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:14px;
}

input,select,button{
width:100%;
padding:12px;
border:1px solid #cbd5e1;
border-radius:10px;
font-size:14px;
}

button{
background:#0f172a;
color:white;
border:none;
cursor:pointer;
}

button:hover{
opacity:.9;
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

th,td{
padding:12px;
border-bottom:1px solid #e2e8f0;
text-align:left;
font-size:14px;
}

th{
background:#f1f5f9;
}

.metric{
font-size:24px;
font-weight:bold;
}

.label{
font-size:13px;
color:#64748b;
}

h1,h2{
margin-bottom:10px;
}
</style>
</head>
<body>

<div class="container">

<div>
<h1>Bismillah Group Bank Position</h1>
<p>Firebase Cloud Based Bank Position Management System</p>
</div>

<div class="card">
<h2>Create Project</h2>

<div class="grid">
<input id="project-name" placeholder="Project Name">
<input id="bank-name" placeholder="Bank Name">
<input id="opening-balance" type="number" placeholder="Opening Balance">
<button onclick="createProject()">Create Project</button>
</div>
</div>

<div class="card">
<h2>Dashboard Summary</h2>
<div class="grid" id="dashboard-summary"></div>
</div>

<div class="card">
<h2>Projects Bank Position</h2>
<table id="projects-table"></table>
</div>

<div class="card">
<h2>Create Voucher</h2>

<div class="grid">
<select id="voucher-project"></select>

<select id="voucher-type">
<option value="receipt">Receipt Voucher</option>
<option value="payment">Payment Voucher</option>
<option value="adjustment">Adjustment Voucher</option>
</select>

<input id="voucher-date" type="date">
<input id="voucher-narration" placeholder="Narration">
<input id="voucher-cheque-no" placeholder="Cheque No">
<input id="voucher-cheque-date" type="date">
<input id="voucher-amount" type="number" placeholder="Amount">

<button onclick="addVoucher()">Add Voucher</button>
</div>
</div>

<div class="card">
<h2>All Vouchers</h2>
<table id="voucher-table"></table>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import {
getFirestore,
collection,
addDoc,
getDocs,
deleteDoc,
updateDoc,
doc
} from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyDb4VHDQ_3mDqrX1oNIfC7hzK18O6znQLE",
authDomain: "bank-application-5c3e1.firebaseapp.com",
projectId: "bank-application-5c3e1",
storageBucket: "bank-application-5c3e1.firebasestorage.app",
messagingSenderId: "540292068600",
appId: "1:540292068600:web:8384df0a6fc4b36d12370d",
measurementId: "G-H8QJGXPWJT"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let projects = [];

window.createProject = async function(){

const projectName = document.getElementById("project-name").value;
const bankName = document.getElementById("bank-name").value;
const openingBalance = Number(document.getElementById("opening-balance").value);

if(!projectName || !bankName) return;

await addDoc(collection(db,"projects"),{
projectName,
bankName,
openingBalance,
receipts:[],
payments:[],
adjustments:[]
});

alert("Project Created Successfully");

loadProjects();


document.getElementById("project-name").value = "";
document.getElementById("bank-name").value = "";
document.getElementById("opening-balance").value = "";

}

async function loadProjects(){

projects = [];

const querySnapshot = await getDocs(collection(db,"projects"));

querySnapshot.forEach((projectDoc)=>{

projects.push({
id:projectDoc.id,
...projectDoc.data()
});

});

renderAll();

}

window.addVoucher = async function(){

const projectIndex = document.getElementById("voucher-project").value;
const type = document.getElementById("voucher-type").value;
const date = document.getElementById("voucher-date").value;
const narration = document.getElementById("voucher-narration").value || "Voucher Entry";
const chequeNo = document.getElementById("voucher-cheque-no").value;
const chequeDate = document.getElementById("voucher-cheque-date").value;
const amount = Number(document.getElementById("voucher-amount").value);

if(projectIndex === "" || !date || !amount) return;

const project = projects[projectIndex];

const voucher = {
voucherNo:`${type.toUpperCase()}-${Date.now()}`,
date,
narration,
chequeNo,
chequeDate,
amount,
status:type === "payment" ? "Pending" : "Approved"
};

if(type === "receipt"){
project.receipts.push(voucher);
}

if(type === "payment"){
project.payments.push(voucher);
}

if(type === "adjustment"){
project.adjustments.push(voucher);
}

await updateDoc(doc(db,"projects",project.id),{
receipts:project.receipts,
payments:project.payments,
adjustments:project.adjustments
});

alert("Voucher Added Successfully");

loadProjects();


document.getElementById("voucher-date").value = "";
document.getElementById("voucher-narration").value = "";
document.getElementById("voucher-cheque-no").value = "";
document.getElementById("voucher-cheque-date").value = "";
document.getElementById("voucher-amount").value = "";

}

window.deleteProject = async function(id){

if(!confirm("Delete this project?")) return;

await deleteDoc(doc(db,"projects",id));

alert("Project Deleted Successfully");

loadProjects();

}

window.editProject = async function(id){

const project = projects.find(p=>p.id === id);

const newProjectName = prompt("Edit Project Name",project.projectName);
const newBankName = prompt("Edit Bank Name",project.bankName);
const newOpeningBalance = prompt("Edit Opening Balance",project.openingBalance);

if(!newProjectName || !newBankName) return;

await updateDoc(doc(db,"projects",id),{
projectName:newProjectName,
bankName:newBankName,
openingBalance:Number(newOpeningBalance)
});

alert("Project Updated Successfully");

loadProjects();

}

function updateProjectDropdown(){

const select = document.getElementById("voucher-project");

select.innerHTML = projects.map((p,i)=>
`<option value="${i}">${p.projectName} - ${p.bankName}</option>`
).join("");

}

function getTotals(){

let opening = 0;
let receipts = 0;
let payments = 0;
let adjustments = 0;

projects.forEach(project=>{

opening += Number(project.openingBalance);

receipts += project.receipts.reduce((a,b)=>a + Number(b.amount),0);

payments += project.payments.reduce((a,b)=>a + Number(b.amount),0);

adjustments += project.adjustments.reduce((a,b)=>a + Number(b.amount),0);

});

const balance = opening + receipts + adjustments - payments;

return {opening,receipts,payments,adjustments,balance};

}

function renderDashboard(){

const totals = getTotals();

const items = [
["Projects",projects.length],
["Opening Balance",totals.opening],
["Receipts",totals.receipts],
["Payments",totals.payments],
["Adjustments",totals.adjustments],
["Current Balance",totals.balance]
];


document.getElementById("dashboard-summary").innerHTML = items.map(item=>`
<div class="card">
<div class="label">${item[0]}</div>
<div class="metric">${Number(item[1]).toLocaleString()}</div>
</div>
`).join("");

}

function renderProjects(){

const rows = projects.map((p,index)=>{

const receipts = p.receipts.reduce((a,b)=>a + Number(b.amount),0);
const payments = p.payments.reduce((a,b)=>a + Number(b.amount),0);
const adjustments = p.adjustments.reduce((a,b)=>a + Number(b.amount),0);

const balance = Number(p.openingBalance) + receipts + adjustments - payments;

return `
<tr>
<td>${index + 1}</td>
<td>${p.projectName}</td>
<td>${p.bankName}</td>
<td>${Number(p.openingBalance).toLocaleString()}</td>
<td>${receipts.toLocaleString()}</td>
<td>${payments.toLocaleString()}</td>
<td>${adjustments.toLocaleString()}</td>
<td>${balance.toLocaleString()}</td>
<td><button onclick="editProject('${p.id}')">Edit</button></td>
<td><button onclick="deleteProject('${p.id}')">Delete</button></td>
</tr>
`;

}).join("");


document.getElementById("projects-table").innerHTML = `
<thead>
<tr>
<th>#</th>
<th>Project</th>
<th>Bank</th>
<th>Opening</th>
<th>Receipts</th>
<th>Payments</th>
<th>Adjustments</th>
<th>Balance</th>
<th>Edit</th>
<th>Delete</th>
</tr>
</thead>
<tbody>
${rows}
</tbody>
`;

}

function renderVouchers(){

let rows = "";

projects.forEach(project=>{

project.receipts.forEach(v=>{
rows += `
<tr>
<td>${project.projectName}</td>
<td>${project.bankName}</td>
<td>Receipt</td>
<td>${v.voucherNo}</td>
<td>${v.date}</td>
<td>${v.narration}</td>
<td>${v.amount.toLocaleString()}</td>
<td>${v.status}</td>
</tr>
`;
});

project.payments.forEach(v=>{
rows += `
<tr>
<td>${project.projectName}</td>
<td>${project.bankName}</td>
<td>Payment</td>
<td>${v.voucherNo}</td>
<td>${v.date}</td>
<td>${v.narration}</td>
<td>${v.amount.toLocaleString()}</td>
<td>${v.status}</td>
</tr>
`;
});

project.adjustments.forEach(v=>{
rows += `
<tr>
<td>${project.projectName}</td>
<td>${project.bankName}</td>
<td>Adjustment</td>
<td>${v.voucherNo}</td>
<td>${v.date}</td>
<td>${v.narration}</td>
<td>${v.amount.toLocaleString()}</td>
<td>${v.status}</td>
</tr>
`;
});

});


document.getElementById("voucher-table").innerHTML = `
<thead>
<tr>
<th>Project</th>
<th>Bank</th>
<th>Type</th>
<th>Voucher No</th>
<th>Date</th>
<th>Narration</th>
<th>Amount</th>
<th>Status</th>
</tr>
</thead>
<tbody>
${rows}
</tbody>
`;

}

function renderAll(){

updateProjectDropdown();
renderDashboard();
renderProjects();
renderVouchers();

}

loadProjects();

</script>

</body>
</html>
